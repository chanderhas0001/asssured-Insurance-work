<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Vehicle Insurance Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      background:
      linear-gradient(rgba(15,23,42,0.82),rgba(37,99,235,0.75)),
      url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .form-container{
      width:100%;
      max-width:850px;
      background:rgba(255,255,255,0.97);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.18);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* HEADER */

    .top-section{
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      padding:55px 40px;
      text-align:center;
    }

    .top-section h1{
      font-size:46px;
      margin-bottom:12px;
      font-weight:800;
    }

    .top-section p{
      max-width:650px;
      margin:auto;
      color:#dbeafe;
      font-size:17px;
      line-height:1.7;
    }

    /* FORM AREA */

    .form-area{
      padding:45px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
    }

    .full{
      grid-column:1/3;
    }

    .input-box label{
      margin-bottom:10px;
      font-size:15px;
      font-weight:700;
      color:#0f172a;
    }

    .input-box input,
    .input-box select{
      padding:16px 18px;
      border-radius:14px;
      border:1px solid #cbd5e1;
      outline:none;
      font-size:15px;
      background:#f8fafc;
      transition:0.3s;
    }

    .input-box input:focus,
    .input-box select:focus{
      border-color:#2563eb;
      background:white;
      box-shadow:0 0 0 5px rgba(37,99,235,0.12);
    }

    /* FILE INPUT */

    .file-upload{
      background:#f8fafc;
      padding:14px;
      cursor:pointer;
    }

    /* BUTTON */

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
      box-shadow:0 10px 25px rgba(37,99,235,0.25);
    }

    .submit-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 35px rgba(37,99,235,0.35);
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .form-grid{
        grid-template-columns:1fr;
      }

      .full{
        grid-column:auto;
      }

      .top-section h1{
        font-size:34px;
      }

      .form-area{
        padding:30px;
      }

    }

  </style>

</head>

<body>

  <div class="form-container">

    <!-- HEADER -->

    <div class="top-section">

      <h1>Vehicle Insurance Form</h1>

      <p>
        Protect your car, bike, or commercial vehicle with complete insurance coverage and fast claim support.
      </p>

    </div>

    <!-- FORM -->

    <div class="form-area">
<form id="insuranceForm">

  <!-- ACCESS KEY -->
  <input type="hidden" name="access_key" value="1dba0e51-0344-4730-8ec1-6cc53fbc679f">

  <!-- SUBJECT -->
  <input type="hidden" name="subject" value="New Vehicle Insurance Lead">

  <div class="form-grid">

    <!-- NAME -->
    <div class="input-box">
      <label>Full Name</label>
      <input type="text" name="name" required>
    </div>

    <!-- PHONE -->
    <div class="input-box">
      <label>Phone Number</label>
      <input type="text" name="phone" required>
    </div>

    <!-- VEHICLE NUMBER -->
    <div class="input-box full">
      <label>Vehicle Registration Number</label>
      <input type="text" name="vehicle_number" required>
    </div>

    <!-- INSURANCE TYPE -->
    <div class="input-box full">
      <label>Type of Insurance</label>
      <select name="insurance_type" required>
        <option>Comprehensive Insurance</option>
        <option>Third Party Insurance</option>
        <option>SAOD Insurance</option>
      </select>
    </div>

    <!-- RC FILE -->
    <div class="input-box full">
      <label>Upload RC Photo / PDF</label>
      <input type="file" id="rc_file" accept="image/*,.pdf" required>
      <input type="hidden" name="rc_url" id="rc_url">
    </div>

    <!-- POLICY FILE -->
    <div class="input-box full">
      <label>Upload Previous Policy</label>
      <input type="file" id="policy_file" accept="image/*,.pdf">
      <input type="hidden" name="policy_url" id="policy_url">
    </div>

    <!-- SUBMIT -->
    <div class="input-box full">
      <button type="submit" class="submit-btn">Submit Vehicle Details</button>
    </div>

  </div>

</form>
      
    </div>

  </div>


<script>

const cloudName = "dpxa19q3n";
const uploadPreset = "insurance_form_docs";

// upload function
async function uploadFile(file) {

  const formData = new FormData();

  formData.append("file", file);
  formData.append("upload_preset", uploadPreset);

  try {

    const response = await fetch(
      `https://api.cloudinary.com/v1_1/${cloudName}/auto/upload`,
      {
        method: "POST",
        body: formData
      }
    );

    const data = await response.json();

    console.log("Cloudinary Response:", data);

    // upload success
    if (data.secure_url) {
       // force pdf to open correctly
       if(file.type === "application/pdf"){
         return data.secure_url.replace("/upload/", "/upload/fl_attachment/");
  }

  return data.secure_url;
    }

    // upload failed
    else {

      alert(
        data.error?.message || "Cloudinary Upload Failed"
      );

      return "";
    }

  } catch (error) {

    console.log("Upload Error:", error);

    alert("File Upload Error");

    return "";
  }

}

// RC upload
document.getElementById("rc_file").addEventListener("change", async function(e) {

  const file = e.target.files[0];

  if(!file) return;

  const url = await uploadFile(file);

  document.getElementById("rc_url").value = url;

});

// Policy upload
document.getElementById("policy_file").addEventListener("change", async function(e) {

  const file = e.target.files[0];

  if(!file) return;

  const url = await uploadFile(file);

  document.getElementById("policy_url").value = url;

});

// form submit
document.getElementById("insuranceForm").addEventListener("submit", async function(e) {

  e.preventDefault();

  // check rc uploaded
  if(!document.getElementById("rc_url").value){

    alert("Please upload RC file first");

    return;
  }

  const formData = new FormData(this);

  try {

    const response = await fetch(
      "https://api.web3forms.com/submit",
      {
        method: "POST",
        body: formData
      }
    );

    const result = await response.json();

    console.log(result);

    if(result.success){

      alert("Form submitted successfully!");

      this.reset();

    } else {

      alert("Form submission failed");

    }

  } catch(error){

    console.log(error);

    alert("Something went wrong");

  }

});

</script>

</body>

</html>
