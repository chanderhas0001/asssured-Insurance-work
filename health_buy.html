<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Insurance Input Form</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:'Segoe UI',sans-serif;
    }

    body{
      min-height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      padding:40px 20px;
      background:
      linear-gradient(rgba(15,23,42,0.82),rgba(37,99,235,0.75)),
      url('https://images.unsplash.com/photo-1584515933487-779824d29309?q=80&w=1400&auto=format&fit=crop');
      background-size:cover;
      background-position:center;
    }

    .form-container{
      width:100%;
      max-width:850px;
      background:rgba(255,255,255,0.97);
      border-radius:30px;
      overflow:hidden;
      box-shadow:0 20px 60px rgba(0,0,0,0.18);
      animation:fadeIn 1s ease;
    }

    @keyframes fadeIn{
      from{
        opacity:0;
        transform:translateY(40px);
      }
      to{
        opacity:1;
        transform:translateY(0);
      }
    }

    /* HEADER */

    .top-section{
      background:linear-gradient(135deg,#2563eb,#3b82f6);
      color:white;
      padding:55px 40px;
      text-align:center;
    }

    .top-section h1{
      font-size:46px;
      margin-bottom:12px;
      font-weight:800;
    }

    .top-section p{
      max-width:650px;
      margin:auto;
      color:#dbeafe;
      font-size:17px;
      line-height:1.7;
    }

    /* FORM AREA */

    .form-area{
      padding:45px;
    }

    .form-grid{
      display:grid;
      grid-template-columns:1fr 1fr;
      gap:25px;
    }

    .input-box{
      display:flex;
      flex-direction:column;
    }

    .input-box.full{
      grid-column:1/3;
    }

    .input-box label{
      margin-bottom:10px;
      font-size:15px;
      font-weight:700;
      color:#0f172a;
    }

    .input-box input,
    .input-box select{
      padding:16px 18px;
      border-radius:14px;
      border:1px solid #cbd5e1;
      outline:none;
      font-size:15px;
      background:#f8fafc;
      transition:0.3s;
    }

    .input-box input:focus,
    .input-box select:focus{
      border-color:#2563eb;
      background:white;
      box-shadow:0 0 0 5px rgba(37,99,235,0.12);
    }

    /* BUTTON */

    .submit-btn{
      width:100%;
      padding:18px;
      border:none;
      border-radius:16px;
      background:linear-gradient(135deg,#2563eb,#1d4ed8);
      color:white;
      font-size:18px;
      font-weight:700;
      cursor:pointer;
      transition:0.3s;
      margin-top:10px;
      box-shadow:0 10px 25px rgba(37,99,235,0.25);
    }

    .submit-btn:hover{
      transform:translateY(-4px);
      box-shadow:0 18px 35px rgba(37,99,235,0.35);
    }

    /* RESPONSIVE */

    @media(max-width:768px){

      .form-grid{
        grid-template-columns:1fr;
      }

      .input-box.full{
        grid-column:auto;
      }

      .top-section h1{
        font-size:34px;
      }

      .form-area{
        padding:30px;
      }

    }

  </style>

</head>

<body>

  <div class="form-container">

    <!-- HEADER -->

    <div class="top-section">

      <h1>Health Insurance Form</h1>

      <p>
        Complete your health insurance application and protect your family with trusted medical coverage plans.
      </p>

    </div>

    <!-- FORM -->

    <div class="form-area">

      <form>

        <div class="form-grid">

          <div class="input-box">
            <label>Full Name</label>
            <input type="text" placeholder="Enter your name">
          </div>

          <div class="input-box">
            <label>Age</label>
            <input type="number" placeholder="Enter age">
          </div>

          <div class="input-box">
            <label>Number of Adults</label>
            <input type="number" placeholder="Adults count">
          </div>

          <div class="input-box">
            <label>Number of Children</label>
            <input type="number" placeholder="Children count">
          </div>

          <div class="input-box">
            <label>Phone Number</label>
            <input type="text" placeholder="Enter phone number">
          </div>

          <div class="input-box">
            <label>Pincode</label>
            <input type="text" placeholder="Enter pincode">
          </div>

          <div class="input-box full">
            <label>City</label>
            <input type="text" placeholder="Enter city name">
          </div>

          <div class="input-box full">
            <button class="submit-btn">
              Submit Details
            </button>
          </div>

        </div>

      </form>

    </div>

  </div>

</body>

</html>
